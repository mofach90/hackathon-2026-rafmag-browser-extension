# Pre-commit hooks. https://pre-commit.com
# See adr/0007-ci-cd-and-automation.md for the why.
#
# Install (one-time per clone):
#   pre-commit install
#   pre-commit install --hook-type commit-msg
#
# Run manually on the whole repo:
#   pre-commit run --all-files

default_language_version:
  python: python3.12

repos:
  # File hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-added-large-files
        args: ["--maxkb=500"]

  # Python — ruff format + lint (locked Round C / ADR 0005)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # Secret scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Conventional Commits — validates the commit message subject line.
  # Locked Round B / ADR 0004.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - "feat"
          - "fix"
          - "docs"
          - "refactor"
          - "test"
          - "chore"
          - "perf"
          - "style"
          - "ci"
          - "build"
          - "revert"

# TypeScript hooks (prettier, eslint) are added as `repo: local` entries here
# when extension/ scaffolds with pnpm. They run via `pnpm exec prettier --check`
# and `pnpm exec eslint`. Markdown is excluded from prettier per ADR 0005.
